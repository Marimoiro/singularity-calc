<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>特異点 到達時間計算機 | Revolution Idle</title>
<meta name="description" content="Estimate the real time to reach a Singularity in Revolution Idle, accounting for atom penalties and refine-tree mitigations." />
<style>
  :root{
    --bg:#0b0d17; --bg2:#141830; --card:#181c34; --card2:#1f2444;
    --line:#2c3358; --txt:#e7e9f5; --sub:#9aa0c8; --dim:#6b719c;
    --acc:#8b7bff; --acc2:#57e0c8; --warn:#ffb454; --bad:#ff6b81; --ok:#57e0c8;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 700px at 80% -10%,#1a1e3d 0,var(--bg) 55%);
    color:var(--txt); font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    line-height:1.6; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:880px;margin:0 auto;padding:28px 18px 80px}
  header{position:relative}
  header h1{font-size:1.5rem;margin:0 0 4px;letter-spacing:.02em;padding-right:180px}
  header h1 .g{background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{color:var(--sub);margin:0 0 22px;font-size:.9rem}
  .langsw{position:absolute;top:0;right:0;display:flex;gap:6px}
  .langsw button,.langsw a.repo{background:#0e1124;border:1px solid var(--line);color:var(--sub);border-radius:8px;padding:5px 10px;font-size:.75rem;cursor:pointer;transition:.15s}
  .langsw a.repo{text-decoration:none;display:inline-flex;align-items:center;gap:4px}
  .langsw a.repo:hover{border-color:var(--acc);color:var(--txt)}
  .langsw button.on{background:#2a2f57;color:var(--txt);border-color:var(--acc)}
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:16px;padding:18px 18px 20px;margin-bottom:18px;box-shadow:0 10px 30px -18px #000}
  .card h2{font-size:.95rem;margin:0 0 14px;color:var(--acc2);font-weight:600;letter-spacing:.03em;display:flex;align-items:center;gap:8px}
  .card h2 .n{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;background:#2a2f57;color:var(--acc);font-size:.75rem;font-weight:700;flex:none}
  label{display:block;font-size:.82rem;color:var(--sub);margin:0 0 6px}
  .hint{font-size:.72rem;color:var(--dim);margin:4px 0 0}
  input[type=text],select,input[type=number]{
    width:100%;background:#0e1124;border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:11px 12px;font-size:1rem;font-family:var(--mono);outline:none;transition:border .15s,box-shadow .15s
  }
  input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px #8b7bff33}
  select{font-family:inherit}
  select option{background:#181c34;color:#e7e9f5}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .seg{display:flex;gap:8px;margin-bottom:12px}
  .seg button{flex:1;background:#0e1124;border:1px solid var(--line);color:var(--sub);padding:9px;border-radius:9px;font-size:.85rem;cursor:pointer;transition:.15s}
  .seg button.on{background:#2a2f57;color:var(--txt);border-color:var(--acc)}

  details.adv{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px}
  details.adv summary{cursor:pointer;color:var(--dim);font-size:.8rem;list-style:none}
  details.adv summary::-webkit-details-marker{display:none}
  details.adv summary:before{content:"▸ ";color:var(--acc)}
  details.adv[open] summary:before{content:"▾ "}
  .mit{display:grid;grid-template-columns:1fr;gap:10px}
  .mrow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;background:#0e1124;border:1px solid var(--line);border-radius:11px;padding:10px 13px}
  .mrow .t{font-size:.85rem;color:var(--txt)}
  .mrow .t small{display:block;color:var(--dim);font-size:.7rem;font-family:var(--mono);margin-top:1px}
  .mrow .ctl{display:flex;align-items:center;gap:8px;justify-self:end}
  .mrow .ctl input[type=number]{width:92px;padding:7px 9px;font-size:.9rem}
  .mrow .ctl .u{font-size:.72rem;color:var(--dim);font-family:var(--mono)}
  .ctl2{display:flex;flex-direction:column;gap:6px;justify-self:end}
  .cirow{display:flex;align-items:center;gap:6px;justify-content:flex-end}
  .cirow label{font-size:.66rem;color:var(--dim);margin:0;white-space:nowrap}
  .cirow input[type=number]{width:76px;padding:6px 8px;font-size:.85rem}
  .cirow .u{font-size:.7rem;color:var(--dim);font-family:var(--mono);min-width:14px}
  .mrow .ctl .chk{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--sub);cursor:pointer;white-space:nowrap}
  .mrow .ctl .chk input{width:auto;margin:0;accent-color:var(--acc2)}
  .tog{position:relative;display:inline-block;width:46px;height:26px;flex:none}
  .tog input{opacity:0;width:0;height:0}
  .tog .sl{position:absolute;inset:0;background:#2a2f57;border:1px solid var(--line);border-radius:999px;transition:.15s;cursor:pointer}
  .tog .sl:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:var(--sub);border-radius:50%;transition:.15s}
  .tog input:checked + .sl{background:#2a5c55;border-color:var(--acc2)}
  .tog input:checked + .sl:before{transform:translateX(20px);background:var(--acc2)}

  .result{text-align:center;padding:8px 0 4px}
  .result .lbl{color:var(--sub);font-size:.82rem;margin-bottom:2px}
  .result .big{font-size:2.4rem;font-weight:700;line-height:1.15;font-family:var(--mono);
    background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .result .sub{color:var(--dim);font-size:.82rem;font-family:var(--mono);margin-top:4px}
  .stat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .stat .b{background:#0e1124;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .stat .b .k{font-size:.72rem;color:var(--dim)}
  .stat .b .v{font-size:.98rem;font-family:var(--mono);color:var(--txt);word-break:break-all}
  .msg{border-radius:10px;padding:11px 13px;font-size:.86rem;margin-top:4px}
  .msg.bad{background:#ff6b8118;border:1px solid #ff6b8155;color:#ffb3bf}
  .msg.ok{background:#57e0c815;border:1px solid #57e0c844;color:#a9f2e4}
  .msg.info{background:#2a2f5733;border:1px solid var(--line);color:var(--sub)}

  table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:6px}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  th,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;font-family:var(--mono)}
  th{color:var(--sub);font-weight:600;font-family:inherit;font-size:.75rem;position:sticky;top:0;background:var(--card2)}
  td:first-child,th:first-child{text-align:left}
  tr td{color:var(--txt)}
  tr.pen td:nth-child(2){color:var(--bad)}
  tr.buf td:nth-child(2){color:var(--ok)}
  tr.off td:nth-child(2){color:var(--dim);text-decoration:line-through}
  .foot{color:var(--dim);font-size:.76rem;margin-top:10px}
  .foot code{background:#0e1124;padding:1px 5px;border-radius:5px;color:var(--acc2)}
  a{color:var(--acc2)}
  .pill{display:inline-block;background:#0e1124;border:1px solid var(--line);border-radius:999px;padding:2px 9px;font-size:.72rem;color:var(--sub);font-family:var(--mono)}
  .btn{background:#2a2f57;border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 14px;font-size:.82rem;cursor:pointer;transition:.15s;margin-top:12px}
  .btn:hover{border-color:var(--acc)}
  .chkline{display:inline-flex;align-items:center;gap:7px;font-size:.82rem;color:var(--sub);cursor:pointer}
  .chkline input{accent-color:var(--acc2);width:16px;height:16px}
</style>

<div class="wrap">
  <header>
    <div class="langsw">
      <a class="repo" href="https://github.com/Marimoiro/singularity-calc" target="_blank" rel="noopener" title="GitHub repository">GitHub ↗</a>
      <button data-lang="ja">日本語</button>
      <button data-lang="en">EN</button>
    </div>
    <h1><span class="g" data-i18n="h1a">特異点</span><span data-i18n="h1b"> 到達時間計算機</span></h1>
    <p data-i18n-html="headerP">Revolution Idle ─ アトムのペナルティと精錬軽減を考慮した「実際にかかる時間」を計算します</p>
  </header>

  <div class="card">
    <h2><span class="n">1</span><span data-i18n="c1">基本</span></h2>
    <div class="row">
      <div class="field">
        <label data-i18n="singMultL">特異点倍率</label>
        <input id="singMult" type="text" value="1" inputmode="text" />
        <p class="hint" data-i18n-html="singMultH"></p>
      </div>
      <div class="field">
        <label data-i18n="curAtomL">現在のアトム量</label>
        <input id="curAtom" type="text" value="1" inputmode="text" />
        <p class="hint" data-i18n-html="curAtomH"></p>
      </div>
    </div>
    <div class="field" style="margin-top:14px">
      <label data-i18n="localSpeedL">ローカル速度</label>
      <input id="localSpeed" type="text" value="1" inputmode="text" />
      <p class="hint" data-i18n-html="localSpeedH"></p>
    </div>
  </div>

  <div class="card">
    <h2><span class="n">2</span><span data-i18n="c2">目標</span></h2>
    <div class="seg" id="modeSeg">
      <button data-mode="sing" class="on" data-i18n="modeSing">特異点の回数で指定</button>
      <button data-mode="atom" data-i18n="modeAtom">アトム量で指定</button>
    </div>
    <div id="singBox" class="field">
      <label data-i18n="singSelL">目標の特異点回数</label>
      <select id="singSel"></select>
      <p class="hint" id="singReq"></p>
    </div>
    <div id="atomBox" class="field" style="display:none">
      <label data-i18n="tgtAtomL">目標アトム量</label>
      <input id="tgtAtom" type="text" value="1.80e308" inputmode="text" />
      <p class="hint" data-i18n-html="tgtAtomH"></p>
    </div>
  </div>

  <div class="card">
    <h2><span class="n">3</span><span data-i18n="c3">ペナルティ軽減設定</span></h2>
    <div class="mit">
      <div class="mrow">
        <div class="t" data-i18n-html="rn126"></div>
        <div class="ctl"><label class="tog"><input type="checkbox" id="rn126"><span class="sl"></span></label></div>
      </div>
      <div class="mrow">
        <div class="t" data-i18n-html="rn127"></div>
        <div class="ctl"><label class="tog"><input type="checkbox" id="rn127"><span class="sl"></span></label></div>
      </div>
      <div class="mrow">
        <div class="t" data-i18n-html="rn128"></div>
        <div class="ctl"><label class="chk"><input type="checkbox" id="rn128chk">MAX</label><input type="number" id="rn128" value="0" min="0" max="10" step="1"><span class="u">Lv</span></div>
      </div>
      <div class="mrow">
        <div class="t" data-i18n-html="tree31"></div>
        <div class="ctl2">
          <div class="cirow"><label data-i18n="treeVal">ツリーの値</label><input type="number" id="tree31" value="1" min="1" step="any"><span class="u">/x</span></div>
          <div class="cirow"><label data-i18n="treePen">ペナルティ</label><input type="number" id="tree31ov" value="" min="0" step="any" placeholder="auto"><span class="u">^</span></div>
        </div>
      </div>
      <div class="mrow">
        <div class="t" data-i18n-html="tree32"></div>
        <div class="ctl2">
          <div class="cirow"><label data-i18n="treeVal">ツリーの値</label><input type="number" id="tree32" value="1" min="1" step="any"><span class="u">/x</span></div>
          <div class="cirow"><label data-i18n="treePen">ペナルティ</label><input type="number" id="tree32ov" value="" min="0" step="any" placeholder="auto"><span class="u">^</span></div>
        </div>
      </div>
      <div class="mrow">
        <div class="t" data-i18n-html="tree62"></div>
        <div class="ctl2">
          <div class="cirow"><label data-i18n="treeVal">ツリーの値</label><input type="number" id="tree62" value="1" min="1" step="any"><span class="u">/x</span></div>
          <div class="cirow"><label data-i18n="treePen">ペナルティ</label><input type="number" id="tree62ov" value="" min="0" step="any" placeholder="auto"><span class="u">^</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2><span class="n">4</span><span data-i18n="c4">バフ（強化）</span></h2>
    <div class="mit">
      <div class="mrow">
        <div class="t" data-i18n-html="virusL"></div>
        <div class="ctl"><label class="tog"><input type="checkbox" id="virus" checked><span class="sl"></span></label></div>
      </div>
      <div class="mrow">
        <div class="t" data-i18n-html="singCntL"></div>
        <div class="ctl"><input type="number" id="singCnt" value="1" min="0" step="any"><span class="u">^</span></div>
      </div>
      <div class="mrow">
        <div class="t" data-i18n-html="relic69L"></div>
        <div class="ctl"><input type="number" id="relic69" value="1.0" min="0" step="any"><span class="u">^</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="msg"></div>
    <div class="result">
      <div class="lbl" data-i18n="resLbl">到達までの推定時間</div>
      <div class="big" id="timeBig">—</div>
      <div class="sub" id="timeSub"></div>
      <div style="margin-top:12px"><label class="chkline"><input type="checkbox" id="localSpeedOn" checked><span data-i18n="applyLS">ローカル速度を反映</span></label></div>
    </div>
    <div class="stat">
      <div class="b"><div class="k" data-i18n="stTgtK">目標地点の実効レート</div><div class="v" id="stTgt">—</div></div>
      <div class="b"><div class="k" data-i18n="stBK">基準倍率 B（ペナルティ無し）</div><div class="v" id="stB">—</div></div>
      <div class="b"><div class="k" data-i18n="stDeltaK">伸ばす桁数 (log₁₀)</div><div class="v" id="stDelta">—</div></div>
      <div class="b"><div class="k" data-i18n="stReqK">目標アトム量</div><div class="v" id="stReq">—</div></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="n">5</span><span data-i18n="c5">ペナルティ区間ごとの内訳</span></h2>
    <div class="seg" id="rateSeg">
      <button data-rate="std" class="on" data-i18n="rateStd">標準表記</button>
      <button data-rate="exp" data-i18n="rateExp">指数表記</button>
    </div>
    <div class="scroll">
      <table id="segTable">
        <thead><tr>
          <th data-i18n="thRange">区間 (アトム)</th>
          <th data-i18n="thEff" data-i18n-title="thEffT">効果</th>
          <th data-i18n="thE">累積指数 E</th>
          <th data-i18n="thRate">実効 ×/秒</th>
          <th data-i18n="thDig" data-i18n-title="thDigT">桁幅</th>
          <th data-i18n="thTime">所要時間</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <p class="foot" data-i18n="segFoot"></p>
    <button class="btn" id="copyBtn" data-i18n="copyBtn">設定と結果をコピー</button>
  </div>

  <div class="card">
    <h2><span class="n">i</span><span data-i18n="ci">計算モデルと前提</span></h2>
    <p class="foot" style="line-height:1.75" data-i18n-html="modelP"></p>
    <p class="foot" data-i18n-html="srcP"></p>
    <p class="foot" style="margin-top:12px;border-top:1px solid var(--line);padding-top:12px" data-i18n="disclaimer"></p>
  </div>
</div>

<script>
(function(){
  "use strict";
  var STORE="revoidle-sing-calc-v2";
  function detectLang(){
    try{ var raw=localStorage.getItem(STORE); if(raw){ var o=JSON.parse(raw); if(o.lang==="ja"||o.lang==="en") return o.lang; } }catch(e){}
    return (navigator.language||navigator.userLanguage||"").toLowerCase().indexOf("ja")===0 ? "ja":"en";
  }
  var LANG=detectLang();

  var T={
    ja:{
      docTitle:"特異点 到達時間計算機 | Revolution Idle",
      h1a:"特異点", h1b:" 到達時間計算機",
      headerP:'<a href="https://store.steampowered.com/app/2763740/Revolution_Idle/" target="_blank" rel="noopener">Revolution Idle</a> ─ アトムのペナルティと精錬軽減を考慮した「実際にかかる時間」を計算します',
      c1:"基本",
      singMultL:"特異点倍率",
      singMultH:'特異点タブの倍率。例: <code style="all:unset">100</code> / <code style="all:unset">1e4</code>',
      curAtomL:"現在のアトム量",
      curAtomH:'既定 <code style="all:unset">1</code>（周回開始）。途中から計算したい時のみ変更',
      localSpeedL:"ローカル速度",
      localSpeedH:'特異点タブのローカル速度。2なら時間が2倍速で進む（所要時間が半分）。例 <code style="all:unset">1440</code>',
      c2:"目標",
      modeSing:"特異点の回数で指定", modeAtom:"アトム量で指定",
      singSelL:"目標の特異点回数",
      tgtAtomL:"目標アトム量",
      tgtAtomH:'「特異点の回数で指定」で選んだ値を引き継ぎます。自由入力も可（例 <code style="all:unset">1e696</code>）',
      c3:"ペナルティ軽減設定",
      rn126:'RN126：<b>1e50</b> ペナルティを無効化<small>原子獲得量 ^0.833 → 無効</small>',
      rn127:'RN127：<b>1.4e154</b> ペナルティを無効化<small>原子獲得量 ^0.847 → 無効</small>',
      rn128:'RN128：<b>1e10</b> ペナルティ弱化<small>指数 = 0.5 + 0.05×Lv（Lv10で無効）</small>',
      tree31:'ツリー3.1：<b>1.8e308</b> ペナルティ弱化<small>ツリー表記の値 x を入力。実効指数 = 0.12 / (2 − x)。または右のペナルティ欄にゲーム値を直接入力</small>',
      tree32:'ツリー3.2：<b>1e500</b> ペナルティ弱化<small>ツリー表記の値 x を入力。実効指数 = 0.05 / (2 − x)。または右のペナルティ欄にゲーム値を直接入力</small>',
      tree62:'ツリー6.2：<b>1e1000</b> ペナルティ弱化<small>ツリー表記の値 x を入力。実効指数 = 0.033 / (2 − x)。または右のペナルティ欄にゲーム値を直接入力</small>',
      treeVal:"ツリーの値", treePen:"ペナルティ",
      c4:"バフ（強化）",
      virusL:'進行7 ウィルスの昇華<small>達成で 原子獲得量^1.02、未達成は ^0.02（重ペナルティ）</small>',
      singCntL:'特異点回数アトム倍率<small>アトム量1から常時 原子獲得量^この値（既定1＝効果なし）</small>',
      relic69L:'遺物69<small>1e6以上で 原子獲得量^この値。ゲームの遺物69の値をそのまま入力（既定1）</small>',
      resLbl:"到達までの推定時間",
      applyLS:"ローカル速度を反映",
      stTgtK:"目標地点の実効レート", stBK:"基準倍率 B（ペナルティ無し）", stDeltaK:"伸ばす桁数 (log₁₀)", stReqK:"目標アトム量",
      c5:"ペナルティ区間ごとの内訳",
      rateStd:"標準表記", rateExp:"指数表記",
      thRange:"区間 (アトム)", thEff:"効果", thE:"累積指数 E", thRate:"実効 ×/秒", thDig:"桁幅", thTime:"所要時間",
      thEffT:"この区間の開始時に発動する効果(バフ/ペナルティ)", thDigT:"この区間で伸びるアトムの桁幅(log₁₀)",
      segFoot:"アトム量が閾値を超えるたびに「原子獲得量」が累乗され、実効レートが下がります。軽減設定を有効にすると該当区間のペナルティが緩みます。",

  function t(k){ var d=T[LANG]; return (d&&d[k]!=null)?d[k]:(T.ja[k]!=null?T.ja[k]:k); }

  // ---- 原子獲得量に累乗される閾値 ----
  function thresholds(s){
    var rn128 = Math.min(1.0, 0.5 + 0.05*(s.rn128||0));
    return [
      {log:0,       e:s.singCnt, kind:"buf", tag:t("tagSingcnt")},
      {log:0,       e:s.virus,   kind:"buf", tag:t("tagVirus")},
      {log:6,       e:s.relic69, kind:"buf", tag:t("tagRelic")},
      {log:10,      e:rn128,     kind:"pen", tag:"RN128"},
      {log:50,      e:s.rn126?1:0.833, kind:"pen", tag:"RN126"},
      {log:154.146, e:s.rn127?1:0.847, kind:"pen", tag:"RN127"},
      {log:256.204, e:0.714,     kind:"pen", tag:""},
      {log:308.255, e:s.tree31,  kind:"pen", tag:t("tagT31")},
      {log:500,     e:s.tree32,  kind:"pen", tag:t("tagT32")},
      {log:1000,    e:s.tree62,  kind:"pen", tag:t("tagT62")},
      {log:2000,    e:0.5,       kind:"pen", tag:""},
      {log:3000,    e:0.333,     kind:"pen", tag:""},
      {log:5000,    e:0.2,       kind:"pen", tag:""},
      {log:10000,   e:0.1,       kind:"pen", tag:""}
    ];
  }
  function Eat(x, ths){ var p=1; for(var i=0;i<ths.length;i++){ if(ths[i].log<=x+1e-9) p*=ths[i].e; } return p; }

  function parseLog10(s){
    if(s==null) return null;
    s=(""+s).trim().replace(/,/g,'');
    if(!s) return null;
    var m=s.match(/^([0-9]*\.?[0-9]+)\s*[eE]\s*([+-]?[0-9]+)$/);
    if(m){ var mant=parseFloat(m[1]); if(!(mant>0)) return null; return Math.log10(mant)+parseInt(m[2],10); }
    var v=parseFloat(s);
    if(isFinite(v)&&v>0) return Math.log10(v);
    return null;
  }
  function fmtLog(x){
    if(!isFinite(x)) return "∞";
    var exp=Math.floor(x); var mant=Math.pow(10,x-exp);
    if(mant>=9.9995){ mant/=10; exp++; }
    return mant.toFixed(2)+"e"+exp;
  }
  var rateMode="std";
  function fmtRate(logA){
    if(logA<=0) return t("rateLE1");
    if(rateMode==="exp") return "×10^"+logA.toFixed(3);
    if(logA<9){ var a=Math.pow(10,logA); return "×"+a.toLocaleString("en-US",{maximumFractionDigits: a<10?4:(a<1000?2:0)}); }
    return "×"+fmtLog(logA);
  }
  function fmtTime(s){
    if(!isFinite(s)) return "∞";
    var Y=31557600;
    var U = LANG==="ja" ? [["年",Y],["日",86400],["時間",3600],["分",60],["秒",1]]
                        : [["y",Y],["d",86400],["h",3600],["m",60],["s",1]];
    if(s<=0) return LANG==="ja"?"0秒":"0s";
    if(s<1) return LANG==="ja"?"1秒未満":"<1s";
    if(s>Y*1000) return (s/Y).toExponential(2)+(LANG==="ja"?" 年":" y");
    var parts=[],rem=s;
    for(var i=0;i<U.length;i++){
      if(rem>=U[i][1]){ var v=Math.floor(rem/U[i][1]); rem-=v*U[i][1]; parts.push(v+U[i][0]); }
      if(parts.length>=2) break;
    }
    return parts.length?parts.join(" "):(LANG==="ja"?"1秒未満":"<1s");
  }
  function reqLog10(N){
    if(N<=10) return 308.2553;
    if(N<=21) return 20*(N-1)+120;
    if(N<=51) return 16*(N-1)+200;
    if(N<=71) return 10*(N-1)+500;
    return (N-1)*(N-1-70)+1200;
  }

  var $=function(id){return document.getElementById(id);};
  var singMult=$("singMult"), curAtom=$("curAtom"), localSpeed=$("localSpeed"), localSpeedOn=$("localSpeedOn"),
      relic69=$("relic69"), singCnt=$("singCnt"), virus=$("virus"),
      rn126=$("rn126"), rn127=$("rn127"), rn128=$("rn128"), rn128chk=$("rn128chk"),
      tree31=$("tree31"), tree32=$("tree32"), tree62=$("tree62"),
      tree31ov=$("tree31ov"), tree32ov=$("tree32ov"), tree62ov=$("tree62ov"),
      singSel=$("singSel"), singReq=$("singReq"), tgtAtom=$("tgtAtom"),
      singBox=$("singBox"), atomBox=$("atomBox"), copyBtn=$("copyBtn");
  var mode="sing";

  function genSelect(){
    var cur=singSel.value||"10";
    var html='<option value="10">'+t("singOne")+t("op")+fmtLog(reqLog10(10))+t("cp")+'</option>';
    for(var N=11;N<=100;N++){ html+='<option value="'+N+'">'+t("singPre")+N+t("op")+fmtLog(reqLog10(N))+t("cp")+'</option>'; }
    singSel.innerHTML=html; singSel.value=cur;
  }
  function applyI18n(){
    try{ document.title=t("docTitle"); document.documentElement.lang=LANG; }catch(e){}

      atomBox.style.display = mode==="atom"?"":"none";

      update();

  function settings(){
    var r69=parseFloat(relic69.value); if(!isFinite(r69)||r69<0) r69=1.0;
    var sc=parseFloat(singCnt.value); if(!isFinite(sc)||sc<0) sc=1.0;
    var vir = virus.checked ? 1.02 : 0.02;
    // 上書き欄が空でなければゲーム表示の実効指数を直接使用。空なら base/(2−x)。
    function treeEff(ovEl, baseDef, xEl){
      var ov=(ovEl.value||"").trim();
      if(ov!==""){ var v=parseFloat(ov); if(isFinite(v)&&v>=0) return Math.min(1,v); }
      var x=parseFloat(xEl.value); if(!isFinite(x)||x<1) x=1; var d=2-x; return d<=0?1:Math.min(1, baseDef/d);
    }
    var t31=treeEff(tree31ov, 0.12,  tree31);
    var t32=treeEff(tree32ov, 0.05,  tree32);
    var t62=treeEff(tree62ov, 0.033, tree62);
    var l128=parseInt(rn128.value,10); if(!isFinite(l128)||l128<0) l128=0; if(l128>10) l128=10;
    return {relic69:r69, singCnt:sc, virus:vir, rn126:rn126.checked, rn127:rn127.checked, rn128:l128,
            tree31:t31, tree32:t32, tree62:t62};
  }
  function targetLog(){
    if(mode==="sing") return reqLog10(parseInt(singSel.value,10));
    return parseLog10(tgtAtom.value);
  }
  function msg(type,txt){ $("msg").innerHTML = txt? '<div class="msg '+type+'">'+txt+'</div>' : ''; }
  function clearOut(){
    $("timeBig").textContent="—"; $("timeSub").textContent="";
    $("stTgt").textContent="—"; $("stB").textContent="—"; $("stDelta").textContent="—"; $("stReq").textContent="—";
    $("segTable").querySelector("tbody").innerHTML="";
  }

  function calc(){
    var s=settings();
    var ths=thresholds(s);
    var x0=parseLog10(curAtom.value);
    var x1=targetLog();
    var logM=parseLog10(singMult.value);

    if(mode==="sing"){ singReq.textContent=t("reqAtoms")+fmtLog(x1); }

    if(x0==null){ msg("bad",t("errCur")); clearOut(); return; }
    if(x1==null){ msg("bad",t("errTgt")); clearOut(); return; }
    if(logM==null){ msg("bad",t("errMult")); clearOut(); return; }

    var logB=logM;
    if(logB<=0){ msg("info",t("needMult")); clearOut(); return; }

    var lsVal=parseFloat(localSpeed.value); if(!isFinite(lsVal)||lsVal<=0) lsVal=1;
    var sf = localSpeedOn.checked ? lsVal : 1;

    $("stReq").textContent=fmtLog(x1);
    if(x1<=x0){ msg("ok",t("reachedMsg"));
      $("timeBig").textContent=t("reached"); $("timeSub").textContent="";
      $("stTgt").textContent="—"; $("stB").textContent=fmtRate(logB); $("stDelta").textContent="0"+t("digits");
      $("segTable").querySelector("tbody").innerHTML=""; return;
    }
    msg("","");

    var bounds=[x0];
    for(var i=0;i<ths.length;i++){ if(ths[i].log>x0+1e-9 && ths[i].log<x1-1e-9) bounds.push(ths[i].log); }
    bounds.push(x1); bounds.sort(function(a,b){return a-b;});

    var total=0, rows="";
    for(var k=0;k<bounds.length-1;k++){
      var lo=bounds[k], hi=bounds[k+1], mid=(lo+hi)/2;
      var Eseg=Eat(mid,ths);
      var logAseg=Eseg*logB;
      var span=hi-lo;
      var tt = logAseg>0 ? span/logAseg : Infinity;
      total+=tt;
      var td = tt/sf;
      var here=[]; for(var j=0;j<ths.length;j++){ if(Math.abs(ths[j].log-lo)<1e-6) here.push(ths[j]); }
      var eff = here.map(function(x){ var v=(+x.e.toFixed(4)); return (x.tag?x.tag+" ":"")+"^"+v; }).join(t("plus")) || (k===0?t("start"):"");
      var isOff = here.length>0 && here.every(function(x){return x.e===1;});
      var isPen = here.some(function(x){return x.kind==="pen" && x.e!==1;});
      var isBuf = here.some(function(x){return x.kind==="buf" && x.e!==1;});
      var cls = isOff?"off":(isPen?"pen":(isBuf?"buf":""));
      rows+='<tr class="'+cls+'"><td>'+fmtLog(lo)+' → '+fmtLog(hi)+'</td>'
          +'<td>'+eff+'</td>'
          +'<td>'+Eseg.toPrecision(3)+'</td>'
          +'<td>'+(logAseg>0?fmtRate(logAseg):"—")+'</td>'
          +'<td>'+span.toFixed(1)+'</td>'
          +'<td>'+fmtTime(td)+'</td></tr>';
    }

    $("timeBig").textContent=fmtTime(total/sf);
    $("timeSub").textContent="= "+Math.round(total/sf).toLocaleString("en-US")+t("secLabel")+(sf!==1?t("lsNote").replace("%1",lsVal):"");
    $("stTgt").textContent=fmtRate(Eat(x1,ths)*logB);
    $("stB").textContent=fmtRate(logB);
    $("stDelta").textContent=(x1-x0).toFixed(1)+t("digits");
    $("segTable").querySelector("tbody").innerHTML=rows;
  }

  var FIELDS=["singMult","curAtom","localSpeed","relic69","singCnt","rn128","tree31","tree32","tree62","tree31ov","tree32ov","tree62ov","tgtAtom","singSel"];

  function save(){

      var o={mode:mode, rateMode:rateMode, lang:LANG};
      FIELDS.forEach(function(id){ o[id]=$(id).value; });
      CHECKS.forEach(function(id){ o[id]=$(id).checked; });
      localStorage.setItem(STORE,JSON.stringify(o));
    }catch(e){}
  }
  function load(){
    try{
      var raw=localStorage.getItem(STORE); if(!raw) return;
      var o=JSON.parse(raw);
      FIELDS.forEach(function(id){ if(o[id]!=null && $(id)) $(id).value=o[id]; });
      CHECKS.forEach(function(id){ if(o[id]!=null && $(id)) $(id).checked=o[id]; });
      if(o.rateMode){ rateMode=o.rateMode;
        document.querySelectorAll("#rateSeg button").forEach(function(x){x.classList.toggle("on",x.dataset.rate===rateMode);});

    L.push((ja?"バフ: 特異点回数=":"Buffs: singCount=")+singCnt.value+(ja?"  遺物69=":"  relic69=")+relic69.value+(ja?"  ウィルスの昇華=":"  virus=")+(virus.checked?"1.02":"0.02"));
    L.push((ja?"軽減: ":"Mit: ")+"RN126="+(rn126.checked?"ON":"OFF")+"  RN127="+(rn127.checked?"ON":"OFF")+"  RN128=Lv"+rn128.value
         +"  "+t("tagT31")+" x="+tree31.value+"(->"+s.tree31.toFixed(4)+")"
         +"  "+t("tagT32")+" x="+tree32.value+"(->"+s.tree32.toFixed(4)+")"

    L.push((ja?"目標: ":"Target: ")+(mode==="sing"?(t("singPre")+singSel.value):("atoms "+tgtAtom.value))+(ja?"  必要=":"  req=")+$("stReq").textContent);
    L.push("--- "+(ja?"結果":"result")+" ---");
    L.push((ja?"総時間=":"time=")+$("timeBig").textContent+"  ("+$("timeSub").textContent+")");
    L.push("B="+$("stB").textContent+"  "+t("stTgtK")+"="+$("stTgt").textContent+"  "+t("stDeltaK")+"="+$("stDelta").textContent);
    L.push("--- "+(ja?"区間内訳":"segments")+" ---");
    Array.prototype.forEach.call(document.querySelectorAll("#segTable tbody tr"),function(r){
      L.push(Array.prototype.map.call(r.children,function(c){return c.textContent;}).join(" | "));
    });
    return L.join("\n");
  }
  copyBtn.addEventListener("click",function(){
    var txt=buildDebug();
    function done(){ copyBtn.textContent=t("copied"); setTimeout(function(){ copyBtn.textContent=t("copyBtn"); },1500); }
    function fallback(){
      var ta=document.createElement("textarea"); ta.value=txt;
      ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); }catch(e){} document.body.removeChild(ta); done();
    }
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done,fallback); }
    else fallback();
  });

  [singMult,curAtom,localSpeed,localSpeedOn,relic69,singCnt,virus,rn126,rn127,rn128,tree31,tree32,tree62,tree31ov,tree32ov,tree62ov,singSel,tgtAtom].forEach(function(el){
    el.addEventListener("input",update); el.addEventListener("change",update);
  });

  genSelect();

})();
